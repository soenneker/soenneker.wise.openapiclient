                    API](/api-reference/facetec/facetecpublickeyget).
                  example: <base64_encoded_string>
      responses:
        '200':
          description: One time token status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ott-response'
              example:
                oneTimeTokenProperties:
                  oneTimeToken: 9f5f5812-2609-4e48-8418-b64437c0c7cd
                  challenges: []
                  validity: 3600
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
          $ref: '#/components/responses/429'
  /v1/one-time-token/sms/trigger:
    post:
      operationId: ottSmsTrigger
      summary: Trigger SMS Challenge
      description: >
        To trigger a SMS challenge by sending SMS to user verified [phone
        number](/api-reference/user-security/usersecurityphonenumberlist)
        containing a 6 digit one time password (**OTP**).


        This **OTP** code can be used to clear a SMS challenge by using the
        [Verify SMS endpoint](/api-reference/one-time-token/ottsmsverify).


        {% admonition type="warning" %}

        The Trigger SMS Challenge API is currently in closed Beta and subject to
        change. Please speak with your implementation manager if you would like
        to use this API.

        {% /admonition %}
      tags:
        - one-time-token
      security:
        - UserToken: []
      parameters:
        - name: One-Time-Token
          in: header
          required: true
          description: Text value of a OTT.
          schema:
            type: string
        - $ref: '#/components/parameters/X-External-Correlation-Id'
      responses:
        '200':
          description: Trigger result with obfuscated phone number.
          content:
            application/json:
              schema:
                type: object
                properties:
                  obfuscatedPhoneNo:
                    type: string
                    description: >-
                      Obfuscated phone number that can be used as a hint for the
                      end customer regarding which phone number the SMS was sent
                      to.
                    example: '*********8888'
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
          $ref: '#/components/responses/429'
  /v1/one-time-token/sms/verify:
    post:
      operationId: ottSmsVerify
      summary: Verify SMS Challenge
      description: >
        To clear a **SMS** challenge listed in a OTT.


        Notes:

        1. User is required to have a verified phone number. See [create phone
        number](/api-reference/user-security/usersecurityphonenumbercreate) for
        more information.

        2. [Trigger SMS Challenge](/api-reference/one-time-token/ottsmstrigger)
        is required to be called first.

        3. Since we won't be sending real SMS on sandbox, the **OTP Code** will
        always be **111111**.


        {% admonition type="warning" %}

        The Verify SMS Challenge API is currently in closed Beta and subject to
        change. Please speak with your implementation manager if you would like
        to use this API.

        {% /admonition %}
      tags:
        - one-time-token
      security:
        - UserToken: []
      parameters:
        - name: One-Time-Token
          in: header
          required: true
          description: Text value of a OTT.
          schema:
            type: string
        - $ref: '#/components/parameters/X-External-Correlation-Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                otpCode:
                  type: string
                  description: 6 digit OTP code in text format.
                  example: '111111'
      responses:
        '200':
          description: One time token status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ott-response'
              example:
                oneTimeTokenProperties:
                  oneTimeToken: 9f5f5812-2609-4e48-8418-b64437c0c7cd
                  challenges: []
                  validity: 3600
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
          $ref: '#/components/responses/429'
  /v1/one-time-token/whatsapp/trigger:
    post:
      operationId: ottWhatsappTrigger
      summary: Trigger WhatsApp Challenge
      description: >
        To trigger a WhatsApp challenge by sending WhatsApp message to user
        verified [phone
        number](/api-reference/user-security/usersecurityphonenumberlist)
        containing a 6 digit one time password (**OTP**).


        This **OTP** code can be used to clear a WHATSAPP challenge by using the
        [Verify WhatsApp
        endpoint](/api-reference/one-time-token/ottwhatsappverify).


        {% admonition type="warning" %}

        The Trigger WhatsApp Challenge API is currently in closed Beta and
        subject to change. Please speak with your implementation manager if you
        would like to use this API.

        {% /admonition %}
      tags:
        - one-time-token
      security:
        - UserToken: []
      parameters:
        - name: One-Time-Token
          in: header
          required: true
          description: Text value of a OTT.
          schema:
            type: string
        - $ref: '#/components/parameters/X-External-Correlation-Id'
      responses:
        '200':
          description: Trigger result with obfuscated phone number.
          content:
            application/json:
              schema:
                type: object
                properties:
                  obfuscatedPhoneNo:
                    type: string
                    description: >-
                      Obfuscated phone number that can be used as a hint for the
                      end customer regarding which phone number the WhatsApp
                      message was sent to.
                    example: '*********8888'
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
          $ref: '#/components/responses/429'
  /v1/one-time-token/whatsapp/verify:
    post:
      operationId: ottWhatsappVerify
      summary: Verify WhatsApp Challenge
      description: >
        To clear a **WHATSAPP** challenge listed in a OTT.


        Notes:

        1. User is required to have a verified phone number. See [create phone
        number](/api-reference/user-security/usersecurityphonenumbercreate) for
        more information.

        2. [Trigger WhatsApp
        Challenge](/api-reference/one-time-token/ottwhatsapptrigger) is required
        to be called first.

        3. Since we won't be sending real WhatsApp message on sandbox, the **OTP
        Code** will always be **111111**.


        {% admonition type="warning" %}

        The Verify WhatsApp Challenge API is currently in closed Beta and
        subject to change. Please speak with your implementation manager if you
        would like to use this API.

        {% /admonition %}
      tags:
        - one-time-token
      security:
        - UserToken: []
      parameters:
        - name: One-Time-Token
          in: header
          required: true
          description: Text value of a OTT.
          schema:
            type: string
        - $ref: '#/components/parameters/X-External-Correlation-Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                otpCode:
                  type: string
                  description: 6 digit OTP code in text format.
                  example: '111111'
      responses:
        '200':
          description: One time token status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ott-response'
              example:
                oneTimeTokenProperties:
                  oneTimeToken: 9f5f5812-2609-4e48-8418-b64437c0c7cd
                  challenges: []
                  validity: 3600
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
          $ref: '#/components/responses/429'
