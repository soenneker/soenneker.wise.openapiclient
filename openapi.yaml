                spendings:
                  - type: ATM_WITHDRAWAL
                    limits:
                      - type: TRANSACTION
                        usage: 0
                        threshold: 1750
                        currency: SGD
                        expiresAt: null
                      - type: DAILY
                        usage: 0
                        threshold: 2700
                        currency: SGD
                        expiresAt: '2022-12-15T16:00:00Z'
                      - type: MONTHLY
                        usage: 0
                        threshold: 5250
                        currency: SGD
                        expiresAt: '2022-12-31T16:00:00Z'
                  - type: ECOM_PURCHASE
                    limits:
                      - type: TRANSACTION
                        usage: 0
                        threshold: 17500
                        currency: SGD
                        expiresAt: null
                      - type: DAILY
                        usage: 0
                        threshold: 17500
                        currency: SGD
                        expiresAt: '2022-12-15T16:00:00Z'
                      - type: MONTHLY
                        usage: 0
                        threshold: 35000
                        currency: SGD
                        expiresAt: '2022-12-31T16:00:00Z'
          headers:
            X-External-Correlation-Id:
              $ref: '#/components/headers/X-External-Correlation-Id'
            x-trace-id:
              $ref: '#/components/headers/x-trace-id'
        '429':
