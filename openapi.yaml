            Name of the bank branch. Provided only when the currency route
            requires it (such as JPY).
          example: null
        accountNumber:
          type:
            - string
            - 'null'
          description: Bank account number.
          example: '9910728'
        accountType:
          type:
            - string
            - 'null'
          description: >-
            Bank account type. Provided only when the currency route requires
            it.
