          type: string
          description: OAuth 2.0 grant type.
          enum:
            - client_credentials
          example: client_credentials
    registration-code-grant:
      type: object
      required:
        - grant_type
        - client_id
        - email
        - registration_code
      properties:
        grant_type:
          type: string
          description: OAuth 2.0 grant type.
          enum:
            - registration_code
          example: registration_code
        client_id:
          type: string
          description: Your API client ID.
        email:
          type: string
          format: email
          description: The email address of the user being registered.
        registration_code:
          type: string
          description: >-
            Registration code obtained when creating the user via `POST
            /v1/user/signup/registration_code`.
    authorization-code-grant:
      type: object
      required:
        - grant_type
        - client_id
        - code
        - redirect_uri
      properties:
        grant_type:
          type: string
          description: OAuth 2.0 grant type.
          enum:
            - authorization_code
          example: authorization_code
        client_id:
          type: string
          description: Your API client ID.
        code:
          type: string
          description: >-
            Authorisation code provided upon redirect back from the
            authorisation flow.
        redirect_uri:
          type: string
          description: Registered redirect URL coordinated with Wise during onboarding.
