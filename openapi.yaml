              example: '0252'
            city:
              type: string
              description: City.
              example: Oslo
            stateCode:
              type:
                - string
                - 'null'
              description: State, province, or region code.
              example: null
            country:
              type: string
              description: Country name.
              example: Norway
        transferWiseAddress:
          type:
            - object
            - 'null'
          description: Wise's address. Provided only when the currency route requires it.
          properties:
            name:
              type: string
              description: Wise's company name.
