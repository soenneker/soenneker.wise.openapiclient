    one-time-token:
      title: One-Time Token
      x-tags:
        - strong-customer-authentication
      type: object
      description: >
        A one-time token is generated when accessing an endpoint secured by SCA.
        This token includes a list of all available challenges to complete.


        You can use the [OTT status
        endpoint](/api-reference/one-time-token/ottstatusget) to view challenges
        and their statuses, or use [create SCA
        session](/api-reference/strong-customer-authentication/scasessioncreate)
        to manually trigger SCA and return a one-time token.


        At least two challenges must be completed to access an SCA-secured
        endpoint. For low-risk operations, access is valid for 5 minutes before
        the one-time token expires.
      properties:
        oneTimeToken:
          type: string
          format: uuid
          description: A one-time token unique identifier.
          example: 5932d5b5-ec13-452f-8688-308feade7834
        challenges:
          type: array
          description: An array of challenges.
          items:
            type: object
            properties:
              primaryChallenge:
                type: object
                properties:
                  type:
                    type: string
                    description: A type of challenge.
                    example: PIN
              passed:
                type: boolean
                description: The status of a challenge.
                example: false
        validity:
          type: integer
          description: The One-Time Token expiration in seconds.
          example: 3600
