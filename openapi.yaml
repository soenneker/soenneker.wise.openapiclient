    quote:
      type: object
      title: Quote
      x-tags:
        - quote
      properties:
        id:
          type: string
          format: uuid
          description: ID of this quote (GUID format).
          example: 11144c35-9fe8-4c32-b7fd-d05c2a7734bf
        sourceCurrency:
          type: string
          description: Source (sending) currency code.
          example: GBP
        targetCurrency:
          type: string
