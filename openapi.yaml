        - name: cardToken
          in: path
          required: true
          description: The unique token identifying the card.
          schema:
            type: string
          example: ca0c8154-1e14-4464-a1ce-dcea7dc3de52
        - $ref: '#/components/parameters/X-External-Correlation-Id'
      responses:
